services:
  postgres:
    image: postgres:17
    container_name: cwm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloud_workspace_manager
      POSTGRES_USER: cloudworkspace_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudworkspace_app"]

  backend:
    build:
      context: ./backend
    container_name: cwm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cloud_workspace_manager
      DB_USER: cloudworkspace_app
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock 

  frontend:
    build:
      context: ./frontend
    container_name: cwm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  postgres_data: