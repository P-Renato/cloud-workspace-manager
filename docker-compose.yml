services:
  postgres:
    image: postgres:17
    container_name: cwm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workspace_manager
      POSTGRES_USER: workspace_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: cwm-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    container_name: cwm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4173:4173"

volumes:
  postgres_data: